  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;\">\n        <div ref=\"{{ dot0Ref }}\" style=\"height:2px;width:24px;border-radius:2px;background:rgba(100,185,255,.2);cursor:pointer;transition:width .38s,background .38s;\"><\u002Fdiv>\n        <div ref=\"{{ dot1Ref }}\" style=\"height:2px;width:24px;border-radius:2px;background:rgba(100,185,255,.2);cursor:pointer;transition:width .38s,background .38s;\"><\u002Fdiv>\n        <div ref=\"{{ dot2Ref }}\" style=\"height:2px;width:24px;border-radius:2px;background:rgba(100,185,255,.2);cursor:pointer;transition:width .38s,background .38s;\"><\u002Fdiv>\n        <div ref=\"{{ dot3Ref }}\" style=\"height:2px;width:24px;border-radius:2px;background:rgba(100,185,255,.2);cursor:pointer;transition:width .38s,background .38s;\"><\u002Fdiv>\n        <div ref=\"{{ dot4Ref }}\" style=\"height:2px;width:24px;border-radius:2px;background:rgba(100,185,255,.2);cursor:pointer;transition:width .38s,background .38s;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div ref=\"{{ kickerRef }}\" style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:#06b6d4;margin-bottom:14px;opacity:0;\"><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:clamp(20px,4vw,64px);align-items:start;\">\n        <h2 ref=\"{{ titleRef }}\" style=\"font-family:'Sora',sans-serif;font-size:clamp(22px,3.1vw,50px);font-weight:800;line-height:1.03;color:#f0f4ff;letter-spacing:-.025em;opacity:0;\"><\u002Fh2>\n        <div>\n          <p ref=\"{{ bodyRef }}\" style=\"font-family:'Inter',sans-serif;font-size:clamp(13px,.9vw,15px);line-height:1.74;color:#7a90b8;opacity:0;\"><\u002Fp>\n          <div ref=\"{{ tagsRef }}\" style=\"display:flex;flex-wrap:wrap;gap:7px;margin-top:12px;opacity:0;\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:20px;display:grid;gap:5px;max-width:240px;\">\n        <div style=\"height:1.5px;border-radius:99px;transform-origin:left;background:linear-gradient(to right,rgba(100,185,255,.7),transparent);animation:traceBar 2.6s ease-in-out infinite;\"><\u002Fdiv>\n        <div style=\"height:1.5px;width:78%;border-radius:99px;transform-origin:left;background:linear-gradient(to right,rgba(100,185,255,.7),transparent);animation:traceBar 2.6s ease-in-out .18s infinite;\"><\u002Fdiv>\n        <div style=\"height:1.5px;width:55%;border-radius:99px;transform-origin:left;background:linear-gradient(to right,rgba(100,185,255,.7),transparent);animation:traceBar 2.6s ease-in-out .36s infinite;\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"position:absolute;bottom:236px;left:50%;transform:translateX(-50%);\n      font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.32em;text-transform:uppercase;\n      color:rgba(100,185,255,.35);white-space:nowrap;pointer-events:none;z-index:10;\n      animation:fadeOut 1.4s 2.8s forwards;\">↓ scroll to explore<\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.canvasRef    = React.createRef();\n    this.bgNumRef     = React.createRef();\n    this.kickerRef    = React.createRef();\n    this.titleRef     = React.createRef();\n    this.bodyRef      = React.createRef();\n    this.tagsRef      = React.createRef();\n    this.vProgressRef = React.createRef();\n    this.coordRef     = React.createRef();\n    this.dot0Ref = React.createRef(); this.dot1Ref = React.createRef();\n    this.dot2Ref = React.createRef(); this.dot3Ref = React.createRef();\n    this.dot4Ref = React.createRef();\n\n    this._animId = null; this._step = -1;\n    this._prog = 0; this._progTarget = 0;\n    this._fns = []; this._t = 0;\n    this._blRender = null; this._blSetSize = null; this._lensMat = null;\n    this._camTarget = { x:0, y:14, z:1 };\n    this._curDisk   = { rMin:1.8, rMax:3.2, tilt:0.0, speed:0.8 };\n    this._reducedMotion = typeof window !== 'undefined' &&\n      window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n\n    this._steps = [\n      { code:'01 / INTELLIGENCE CORE',   title:'Enterprise AI gathers into one field',\n        body:'Data comets from every domain arc inward — documents, workflows, images and decisions spiralling into one trustworthy intelligence layer.',\n        tags:['ML Systems','RAG','Decision AI'] },\n      { code:'02 / AGENT ORBITS',         title:'Agents move around real work',\n        body:'Five autonomous agents orbit the core — each locked to a task: evidence review, knowledge search, report drafting, data query, human escalation.',\n        tags:['Agents','Copilots','Audit trails'] },\n      { code:'03 / HEALTHMATE HELIX',     title:'Healthcare support becomes continuous',\n        body:'The double helix carries HealthMate through every layer of care: conversational intake, appointment assistance, reminders, and clinician-ready summaries.',\n        tags:['HealthMate','Voice intake','Care workflows'] },\n      { code:'04 / REGULATED GALAXY',    title:'Pharma quality signals crystallise',\n        body:'Inspection observations, CAPA reasoning, SOP gaps and data integrity signals lock into a navigable regulatory intelligence framework.',\n        tags:['Pharma AI','CAPA','GMP'] },\n      { code:'05 / FRONTIER DEPLOYMENT', title:'Research ignites into deployed systems',\n        body:'The frontier ignites: a rocket of production-grade AI lifts off carrying robotics, federated learning, AIoT, biochip research and photonics.',\n        tags:['Robotics','Federated AI','Frontier Lab'] }\n    ];\n\n    this._diskCfg = [\n      { rMin:1.8, rMax:3.2, tilt:0.00, speed:0.80, color:[0.14,0.55,1.00] },\n      { rMin:2.0, rMax:5.5, tilt:0.35, speed:0.60, color:[0.06,0.72,0.94] },\n      { rMin:1.4, rMax:3.0, tilt:0.62, speed:1.10, color:[0.08,0.85,0.58] },\n      { rMin:2.8, rMax:7.0, tilt:0.12, speed:0.50, color:[0.58,0.35,1.00] },\n      { rMin:1.5, rMax:8.5, tilt:0.48, speed:1.45, color:[1.00,0.72,0.20] }\n    ];\n    // Camera positions — each tells a different spatial story\n    this._camPos = [\n      { x:0,  y:14,  z:2  },   // 0: overhead — watch comets rain in\n      { x:12, y:3.5, z:6  },   // 1: equatorial — see agents orbit\n      { x:5,  y:7,   z:9  },   // 2: angled — helix rising through jets\n      { x:-8, y:9,   z:7  },   // 3: three-quarter — molecular cage\n      { x:3,  y:-2,  z:11 }    // 4: low angle — rocket launches overhead\n    ];\n    this._accents = ['#06b6d4','#3b82f6','#10b981','#8b5cf6','#f59e0b'];\n  }\n\n  renderVals() {\n    return {\n      canvasRef:this.canvasRef, bgNumRef:this.bgNumRef,\n      kickerRef:this.kickerRef, titleRef:this.titleRef,\n      bodyRef:this.bodyRef, tagsRef:this.tagsRef,\n      vProgressRef:this.vProgressRef, coordRef:this.coordRef,\n      dot0Ref:this.dot0Ref, dot1Ref:this.dot1Ref, dot2Ref:this.dot2Ref,\n      dot3Ref:this.dot3Ref, dot4Ref:this.dot4Ref,\n    };\n  }\n\n  componentDidMount()    { this._boot(); }\n  componentWillUnmount() {\n    if (this._animId) cancelAnimationFrame(this._animId);\n    this._fns.forEach(f => f());\n    if (this._rend) { this._rend.setAnimationLoop(null); this._rend.dispose(); }\n  }\n\n  _boot() {\n    if (!window.THREE || !window.gsap) { setTimeout(() => this._boot(), 40); return; }\n    this._initThree();\n    this._initScroll();\n    this._show(0, true);\n  }\n\n  /* ══════════════════════ THREE INIT ══════════════════════ */\n  _initThree() {\n    const THREE = window.THREE;\n    const cv = this.canvasRef.current; if (!cv) return;\n    const W = innerWidth, H = innerHeight, mob = W < 760;\n    const addB = THREE.AdditiveBlending;\n\n    const rend = new THREE.WebGLRenderer({ canvas:cv, antialias:true, alpha:false, powerPreference:'high-performance' });\n    rend.setPixelRatio(Math.min(devicePixelRatio, 3));\n    rend.setSize(W, H);\n    rend.setClearColor(0x020510, 1);\n    this._rend = rend;\n\n    const sc  = new THREE.Scene();\n    sc.fog = new THREE.FogExp2(0x020510, 0.004);\n    const cam = new THREE.PerspectiveCamera(52, W/H, 0.1, 200);\n    cam.position.set(0, 14, 2);\n    cam.lookAt(0,0,0);\n    this._cam = cam;\n\n    /* ── SHARED SHADERS ── */\n    const PT_V = `attribute float aSize;uniform float uTime;\n      void main(){\n        float p=0.97+0.03*sin(uTime*1.6+position.x*2.1+position.z*1.9);\n        vec4 mv=modelViewMatrix*vec4(position,1.0);\n        gl_PointSize=clamp(aSize*p*(310.0/-mv.z),0.4,28.0);\n        gl_Position=projectionMatrix*mv;\n      }`;\n    const PT_F = `uniform vec3 uColor;\n      void main(){\n        vec2 uv=gl_PointCoord-.5;float r=length(uv)*2.0;if(r>1.0)discard;\n        float core=1.0-smoothstep(0.0,0.05,r);\n        float aura=smoothstep(0.68,0.10,r)*(1.0-core)*0.20;\n        float glow=pow(1.0-r,7.0)*0.08;\n        gl_FragColor=vec4(clamp(uColor+core*0.14,0.0,1.0),(core*0.99+aura+glow)*0.94);\n      }`;\n    const CP_V = `attribute float aSize;attribute vec3 aColor;varying vec3 vColor;\n      void main(){vColor=aColor;vec4 mv=modelViewMatrix*vec4(position,1.0);\n        gl_PointSize=clamp(aSize*(280.0/-mv.z),0.4,300.0);gl_Position=projectionMatrix*mv;}`;\n    const OPV  = `attribute float aSize;attribute vec3 aColor;varying vec3 vColor;\n      void main(){vColor=aColor;vec4 mv=modelViewMatrix*vec4(position,1.);\n        gl_PointSize=clamp(aSize*(260.0/-mv.z),0.5,32.0);gl_Position=projectionMatrix*mv;}`;\n    const OPF  = `varying vec3 vColor;uniform float uOpacity;\n      void main(){vec2 uv=gl_PointCoord-.5;float r=length(uv)*2.;if(r>1.)discard;\n        float core=1.-smoothstep(0.0,0.14,r);\n        float glow=pow(1.-r,6.0)*0.25;\n        gl_FragColor=vec4(vColor,(core*0.97+glow)*uOpacity);}` ;\n    const STAR_F= `varying vec3 vColor;\n      void main(){vec2 uv=gl_PointCoord-.5;float r=length(uv)*2.;if(r>1.)discard;\n        float core=1.-smoothstep(0.0,0.26,r);\n        float spike=pow(1.-r,10.0)*0.5;\n        gl_FragColor=vec4(vColor,(core*0.94+spike)*0.99);}` ;\n    const NEB_F = `varying vec3 vColor;\n      void main(){vec2 uv=gl_PointCoord-.5;float r=length(uv)*2.;if(r>1.)discard;\n        gl_FragColor=vec4(vColor,pow(1.0-r,5.5)*0.032);}`;\n    const JET_F = `varying vec3 vColor;uniform float uOpacity;\n      void main(){vec2 uv=gl_PointCoord-.5;float r=length(uv)*2.;if(r>1.)discard;\n        float core=1.-smoothstep(0.,0.17,r);\n        float glow=pow(1.-r,5.0)*0.30;\n        gl_FragColor=vec4(vColor,(core*0.93+glow)*0.92*uOpacity);}` ;\n    const RIM_V = `varying vec3 vN,vV;\n      void main(){vN=normalize(normalMatrix*normal);\n        vec4 mv=modelViewMatrix*vec4(position,1.0);vV=normalize(-mv.xyz);\n        gl_Position=projectionMatrix*mv;}`;\n    const RIM_F = `varying vec3 vN,vV;uniform vec3 uColor;\n      void main(){float rim=pow(1.0-abs(dot(vN,vV)),4.5);gl_FragColor=vec4(uColor,rim*0.52);}`;\n    const GLW_V = `varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`;\n    const GLW_F = `varying vec2 vUv;\n      void main(){float r=length(vUv-.5)*2.0;\n        vec3 col=mix(vec3(1.0,.78,.42),vec3(.9,.22,.04),r*r);\n        gl_FragColor=vec4(col,(1.0-smoothstep(.06,1.0,r))*0.13);}`;\n\n    /* ── DISK GROUP ── */\n    const diskGroup=new THREE.Group(); sc.add(diskGroup); this._diskGroup=diskGroup;\n    const N=mob?2000:6000;\n    const dPos=new Float32Array(N*3),dSz=new Float32Array(N);\n    this._diskPos=dPos; this._phase=new Float32Array(N);\n    this._bRadius=new Float32Array(N); this._dSpeed=new Float32Array(N);\n    this._rOff=new Float32Array(N); this._N=N;\n    for(let i=0;i<N;i++){\n      const rA=Math.abs(Math.sin(i*12.9898)*43758.5453)%1;\n      const rB=Math.abs(Math.sin(i*78.233)*24634.6345)%1;\n      this._phase[i]=rA*Math.PI*2; this._bRadius[i]=Math.pow(rB,.55);\n      this._dSpeed[i]=.4+rA*.8; this._rOff[i]=rA; dSz[i]=.55+rA*1.95;\n    }\n    const ptGeo=new THREE.BufferGeometry();\n    ptGeo.setAttribute('position',new THREE.BufferAttribute(dPos,3));\n    ptGeo.setAttribute('aSize',   new THREE.BufferAttribute(dSz,1));\n    const ptMat=new THREE.ShaderMaterial({\n      uniforms:{uColor:{value:new THREE.Color(.14,.55,1)},uTime:{value:0}},\n      vertexShader:PT_V,fragmentShader:PT_F,transparent:true,blending:addB,depthWrite:false\n    });\n    diskGroup.add(new THREE.Points(ptGeo,ptMat));\n    this._ptGeo=ptGeo; this._ptMat=ptMat;\n\n    const igMat=new THREE.ShaderMaterial({vertexShader:GLW_V,fragmentShader:GLW_F,\n      transparent:true,blending:addB,depthWrite:false,side:THREE.DoubleSide});\n    const ig=new THREE.Mesh(new THREE.CircleGeometry(2.4,128),igMat);\n    ig.rotation.x=Math.PI/2; diskGroup.add(ig);\n\n    /* ── EVENT HORIZON ── */\n    sc.add(new THREE.Mesh(new THREE.SphereGeometry(1.05,64,64),\n      new THREE.MeshBasicMaterial({color:0x000000})));\n\n    /* ── PHOTON RING ── */\n    const prMat=new THREE.MeshBasicMaterial({color:0x88ccff,transparent:true,opacity:.9,side:THREE.DoubleSide});\n    const photonRing=new THREE.Mesh(new THREE.TorusGeometry(1.52,.015,16,256),prMat);\n    photonRing.rotation.x=Math.PI/2; sc.add(photonRing);\n    const grMat=new THREE.MeshBasicMaterial({color:0x3388ff,transparent:true,opacity:.014,blending:addB,depthWrite:false});\n    const glowRing=new THREE.Mesh(new THREE.TorusGeometry(1.52,.15,8,80),grMat);\n    glowRing.rotation.x=Math.PI/2; sc.add(glowRing);\n    this._photonRing=photonRing; this._glowRing=glowRing;\n\n    /* ── RIM GLOW ── */\n    const rimMat=new THREE.ShaderMaterial({\n      uniforms:{uColor:{value:new THREE.Color(.14,.55,1)}},\n      vertexShader:RIM_V,fragmentShader:RIM_F,transparent:true,blending:addB,depthWrite:false,side:THREE.BackSide\n    });\n    sc.add(new THREE.Mesh(new THREE.SphereGeometry(1.14,64,64),rimMat));\n    this._rimMat=rimMat;\n\n    /* ── POLAR JETS ── */\n    const J=mob?200:720,halfJ=Math.floor(J/2);\n    const jPos=new Float32Array(J*3),jCol=new Float32Array(J*3),jSz=new Float32Array(J);\n    this._jetPos=jPos; this._jetPhase=new Float32Array(J); this._J=J;\n    for(let i=0;i<J;i++){\n      const rA=Math.abs(Math.sin(i*91.234)*12345.678)%1,frac=(i%halfJ)/halfJ;\n      this._jetPhase[i]=rA*Math.PI*2; jSz[i]=.28+rA*.7;\n      jCol[i*3]=.72-frac*.38; jCol[i*3+1]=.88-frac*.18; jCol[i*3+2]=1.0;\n    }\n    const jGeo=new THREE.BufferGeometry();\n    jGeo.setAttribute('position',new THREE.BufferAttribute(jPos,3));\n    jGeo.setAttribute('aColor',  new THREE.BufferAttribute(jCol,3));\n    jGeo.setAttribute('aSize',   new THREE.BufferAttribute(jSz,1));\n    const jetMat=new THREE.ShaderMaterial({uniforms:{uOpacity:{value:0}},\n      vertexShader:CP_V,fragmentShader:JET_F,transparent:true,blending:addB,depthWrite:false});\n    sc.add(new THREE.Points(jGeo,jetMat));\n    this._jetGeo=jGeo; this._jetMat=jetMat;\n\n    /* ── BACKGROUND STARS ── */\n    const SC=mob?700:2000;\n    const sPos=new Float32Array(SC*3),sCol=new Float32Array(SC*3),sSz=new Float32Array(SC);\n    for(let i=0;i<SC;i++){\n      sPos[i*3]=(Math.random()-.5)*100;sPos[i*3+1]=(Math.random()-.5)*70;sPos[i*3+2]=-20-Math.random()*80;\n      const ty=Math.random();\n      if(ty<.6){sCol[i*3]=.78+Math.random()*.22;sCol[i*3+1]=.88+Math.random()*.12;sCol[i*3+2]=1;}\n      else if(ty<.85){sCol[i*3]=1;sCol[i*3+1]=.92+Math.random()*.08;sCol[i*3+2]=.62+Math.random()*.28;}\n      else{sCol[i*3]=1;sCol[i*3+1]=.48+Math.random()*.28;sCol[i*3+2]=.18+Math.random()*.24;}\n      sSz[i]=.14+Math.random()*.7;\n    }\n    const stGeo=new THREE.BufferGeometry();\n    stGeo.setAttribute('position',new THREE.BufferAttribute(sPos,3));\n    stGeo.setAttribute('aColor',  new THREE.BufferAttribute(sCol,3));\n    stGeo.setAttribute('aSize',   new THREE.BufferAttribute(sSz,1));\n    const stPts=new THREE.Points(stGeo,new THREE.ShaderMaterial({uniforms:{},\n      vertexShader:CP_V,fragmentShader:STAR_F,transparent:true,blending:addB,depthWrite:false}));\n    sc.add(stPts);\n\n    /* ── NEBULA ── */\n    const NE=22,nPos=new Float32Array(NE*3),nCol=new Float32Array(NE*3),nSz=new EC 2: DNA HELIX — HealthMate double spiral ══ */\n  _initHelix(sc,addB,vS,fS,mob){\n    const THREE=window.THREE;\n    const NH=mob?280:640,half=NH/2;\n    const hPos=new Float32Array(NH*3),hCol=new Float32Array(NH*3),hSz=new Float32Array(NH);\n    for(let i=0;i<NH;i++){\n      const f=(i%half)/half;\n      hCol[i*3]=f*.12;hCol[i*3+1]=.68+f*.22;hCol[i*3+2]=.55+f*.3;hSz[i]=.75;\n    }\n    const hGeo=new THREE.BufferGeometry();\n    hGeo.setAttribute('position',new THREE.BufferAttribute(hPos,3));\n    hGeo.setAttribute('aColor',  new THREE.BufferAttribute(hCol,3));\n    hGeo.setAttribute('aSize',   new THREE.BufferAttribute(hSz,1));\n    const hMat=new THREE.ShaderMaterial({uniforms:{uOpacity:{value:0}},\n      vertexShader:vS,fragmentShader:fS,transparent:true,blending:addB,depthWrite:false});\n    sc.add(new THREE.Points(hGeo,hMat));\n    this._hGeo=hGeo;this._hPos=hPos;this._hMat=hMat;this._NH=NH;\n  }\n\n  _updateHelix(t,p){\n    const op=this._sOp(p,2);\n    this._hMat.uniforms.uOpacity.value=op;\n    if(op<.01) return;\n    const pos=this._hPos,NH=this._NH,half=NH/2;\n    for(let i=0;i<NH;i++){\n      const arm=i<half?0:1,j=i%half,frac=j/(half-1);\n      const ang=frac*Math.PI*8+arm*Math.PI+t*.55;\n      const y=(frac-.5)*13;\n      pos[i*3]=1.55*Math.cos(ang);pos[i*3+1]=y;pos[i*3+2]=1.55*Math.sin(ang);\n    }\n    this._hGeo.attributes.position.needsUpdate=true;\n  }\n\n  /* ══ SEC 3: ICOSAHEDRON CAGE — regulatory molecular framework ══ */\n  _initCage(sc,addB){\n    const THREE=window.THREE;\n    const icoBase=new THREE.IcosahedronGeometry(7,0);\n    const edges=new THREE.EdgesGeometry(icoBase);\n    const cageMat=new THREE.LineBasicMaterial({color:0x8b5cf6,transparent:true,opacity:0,blending:addB,depthWrite:false});\n    const cage=new THREE.LineSegments(edges,cageMat); sc.add(cage);\n    icoBase.dispose();\n    this._cage=cage;this._cageMat=cageMat;\n\n    // Node pulses: icosahedron has 12 unique verts\n    const phi=(1+Math.sqrt(5))/2,sc7=7/Math.sqrt(1+phi*phi);\n    const iVerts=[\n      [0,sc7,phi*sc7],[0,-sc7,phi*sc7],[0,sc7,-phi*sc7],[0,-sc7,-phi*sc7],\n      [sc7,phi*sc7,0],[-sc7,phi*sc7,0],[sc7,-phi*sc7,0],[-sc7,-phi*sc7,0],\n      [phi*sc7,0,sc7],[-phi*sc7,0,sc7],[phi*sc7,0,-sc7],[-phi*sc7,0,-sc7]\n    ];\n    const NV=iVerts.length;\n    const nvPos=new Float32Array(NV*3),nvSz=new Float32Array(NV);\n    iVerts.forEach((v,i)=>{nvPos[i*3]=v[0];nvPos[i*3+1]=v[1];nvPos[i*3+2]=v[2];nvSz[i]=2.8;});\n    const nvGeo=new THREE.BufferGeometry();\n    nvGeo.setAttribute('position',new THREE.BufferAttribute(nvPos,3));\n    nvGeo.setAttribute('aSize',   new THREE.BufferAttribute(nvSz,1));\n    const NV_V=`attribute float aSize;void main(){vec4 mv=modelViewMatrix*vec4(position,1.);\n      gl_PointSize=clamp(aSize*(320./-mv.z),.5,26.);gl_Position=projectionMatrix*mv;}`;\n    const NV_F=`uniform float uOpacity;uniform float uPulse;\n      void main(){vec2 uv=gl_PointCoord-.5;float r=length(uv)*2.;if(r>1.)discard;\n        float core=1.-smoothstep(0.,.15,r);\n        float glow=pow(1.-r,5.5)*0.28;\n        gl_FragColor=vec4(.58,.38,.98,(core*0.98+glow)*uOpacity*uPulse);}` ;\n    const nvMat=new THREE.ShaderMaterial({uniforms:{uOpacity:{value:0},uPulse:{value:1}},\n      vertexShader:NV_V,fragmentShader:NV_F,transparent:true,blending:addB,depthWrite:false});\n    sc.add(new THREE.Points(nvGeo,nvMat));\n    this._nvMat=nvMat;\n  }\n\n  _updateCage(t,p){\n    const op=this._sOp(p,3);\n    this._cageMat.opacity=op*.52;\n    this._nvMat.uniforms.uOpacity.value=op;\n    this._nvMat.uniforms.uPulse.value=.6+Math.sin(t*2.4)*.4;\n    if(this._cage){this._cage.rotation.y=t*.048;this._cage.rotation.x=Math.sin(t*.031)*.12;}\n  }\n\n  /* ══ SEC 4: ROCKET LAUNCH — frontier ignition ══ */\n  _initRocket(sc,addB,vS,fS,mob){\n    const THREE=window.THREE;\n    // Rocket body\n    const rPos=new Float32Array(3);\n    const rGeo=new THREE.BufferGeometry();\n    rGeo.setAttribute('position',new THREE.BufferAttribute(rPos,3));\n    const rMat=new THREE.PointsMaterial({color:0xffeebb,size:.45,sizeAttenuation:true,\n      transparent:true,blending:addB,depthWrite:false});\n    sc.add(new THREE.Points(rGeo,rMat));\n    this._rPos=rPos;this._rGeo=rGeo;this._rMat=rMat;\n\n    // Exhaust cone\n    const EN=mob?80:160;\n    const ePos=new Float32Array(EN*3),eCol=new Float32Array(EN*3),eSz=new Float32Array(EN);\n    const ePh=new Float32Array(EN),eRd=new Float32Array(EN);\n    for(let i=0;i<EN;i++){ePh[i]=Math.random()*Math.PI*2;eRd[i]=Math.random();eSz[i]=.5+Math.random()*.9;}\n    const eGeo=new THREE.BufferGeometry();\n    eGeo.setAttribute('position',new THREE.BufferAttribute(ePos,3));\n    eGeo.setAttribute('aColor',  new THREE.BufferAttribute(eCol,3));\n    eGeo.setAttribute('aSize',   new THREE.BufferAttribute(eSz,1));\n    const eMat=new THREE.ShaderMaterial({uniforms:{uOpacity:{value:0}},\n      vertexShader:vS,fragmentShader:fS,transparent:true,blending:addB,depthWrite:false});\n    sc.add(new THREE.Points(eGeo,eMat));\n    this._ePos=ePos;this._eCol=eCol;this._eGeo=eGeo;this._eMat=eMat;\n    this._ePh=ePh;this._eRd=eRd;this._EN=EN;this._rocketT=0;\n  }\n\n  _updateRocket(t,p,dt){\n    const op=this._sOp(p,4);\n    this._rMat.opacity=op;\n    this._eMat.uniforms.uOpacity.value=op*.92;\n    if(op<.01){this._rPos[1]=999;this._rGeo.attributes.position.needsUpdate=true;return;}\n    this._rocketT+=dt/5.5;\n    if(this._rocketT>1) this._rocketT=0;\n    const ry=-3+Math.pow(this._rocketT,1.7)*24; // ease-in acceleration\n    this._rPos[0]=.25;this._rPos[1]=ry;this._rPos[2]=.15;\n    this._rGeo.attributes.position.needsUpdate=true;\n    const trailLen=1.4+this._rocketT*2.2;\n    const pos=this._ePos,col=this._eCol,EN=this._EN;\n    for(let i=0;i<EN;i++){\n      const frac=i/EN,dy=-frac*trailLen;\n      const ang=this._ePh[i]+t*4.8,spread=frac*.85*this._eRd[i];\n      pos[i*3]=.25+Math.cos(ang)*spread;pos[i*3+1]=ry+dy;pos[i*3+2]=.15+Math.sin(ang)*spread;\n      const heat=1-frac*.85;\n      col[i*3]=1.;col[i*3+1]=heat*.52;col[i*3+2]=heat*.08;\n    }\n    this._eGeo.attributes.position.needsUpdate=true;\n  }\n\n  /* ══ BLOOM + GRAVITATIONAL LENSING PIPELINE ══ */\n  _initBloom(sc,cam,rend,W,H){\n    const THREE=window.THREE;\n    try{\n      const HW=Math.floor(W*.8),HH=Math.floor(H*.8);\n      const rtO={minFilter:THREE.LinearFilter,magFilter:THREE.LinearFilter,format:THREE.RGBAFormat};\n      const rtScene =new THREE.WebGLRenderTarget(W, H, rtO);\n      const rtLensed=new THREE.WebGLRenderTarget(W, H, rtO);\n      const rtBright=new THREE.WebGLRenderTarget(HW,HH,rtO);\n      const rtBlurH =new THREE.WebGLRenderTarget(HW,HH,rtO);\n      const rtBlurV =new THREE.WebGLRenderTarget(HW,HH,rtO);\n      this._fns.push(()=>{[rtScene,rtLensed,rtBright,rtBlurH,rtBlurV].forEach(r=>r.dispose());});\n\n      const SQ_V=`varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position,1.0);}`;\n\n      // Gravitational lensing — Schwarzschild approximation warps stars around BH\n      const LENS_F=`\n        uniform sampler2D tScene;uniform vec2 uBHPos;uniform float uStrength;varying vec2 vUv;\n        void main(){\n          vec2 d=vUv-uBHPos;float dist=length(d);\n          float warp=uStrength*0.005/(dist*dist+0.0018);\n          vec2 wUV=vUv-normalize(d)*warp*smoothstep(0.0,0.42,dist);\n          gl_FragColor=texture2D(tScene,clamp(wUV,0.001,0.999));\n        }`;\n\n      const THRESH_F=`\n        uniform sampler2D tScene;uniform float uThresh;varying vec2 vUv;\n        void main(){\n          vec3 col=texture2D(tScene,vUv).rgb;\n          float lum=dot(col,vec3(0.2126,0.7152,0.0722));\n          float b=max(0.0,lum-uThresh);\n          gl_FragColor=vec4(col*(b/max(lum,0.0001)),1.0);\n        }`;\n\n      const BLUR_F=`\n        uniform sampler2D tInput;uniform vec2 uDir;uniform vec2 uRes;varying vec2 vUv;\n        void main(){\n          vec2 st=uDir/uRes;\n          vec3 c= texture2D(tInput,vUv+st*(-4.0)).rgb*0.0013\n                + texture2D(tInput,vUv+st*(-3.0)).rgb*0.0133\n                + texture2D(tInput,vUv+st*(-2.0)).rgb*0.0797\n                + texture2D(tInput,vUv+st*(-1.0)).rgb*0.2827\n                + texture2D(tInput,vUv           ).rgb*0.4460\n                + texture2D(tInput,vUv+st*( 1.0)).rgb*0.2827\n                + texture2D(tInput,vUv+st*( 2.0)).rgb*0.0797\n                + texture2D(tInput,vUv+st*( 3.0)).rgb*0.0133\n                + texture2D(tInput,vUv+st*( 4.0)).rgb*0.0013;\n          gl_FragColor=vec4(c,1.0);\n        }`;\n\n      const COMP_F=`\n        uniform sampler2D tScene;uniform sampler2D tBloom;uniform float uStrength;varying vec2 vUv;\n        void main(){\n          vec3 scene=texture2D(tScene,vUv).rgb;\n          vec3 bloom=texture2D(tBloom,vUv).rgb;\n          gl_FragColor=vec4(scene+bloom*uStrength,1.0);\n        }`;\n\n      const sqGeo=new THREE.PlaneGeometry(2,2);\n      const sqCam=new THREE.OrthographicCamera(-1,1,1,-1,0,1);\n      const mkSc=mat=>{const s=new THREE.Scene();s.add(new THREE.Mesh(sqGeo,mat));return s;};\n\n      const lensMat=new THREE.ShaderMaterial({\n        uniforms:{tScene:{value:rtScene.texture},uBHPos:{value:new THREE.Vector2(.5,.5)},uStrength:{value:1.0}},\n        vertexShader:SQ_V,fragmentShader:LENS_F,depthTest:false,depthWrite:false\n      });\n      const threshMat=new THREE.ShaderMaterial({\n        uniforms:{tScene:{value:rtLensed.texture},uThresh:{value:0.83}},\n        vertexShader:SQ_V,fragmentShader:THRESH_F,depthTest:false,depthWrite:false\n      });\n      const blurHMat=new THREE.ShaderMaterial({\n        uniforms:{tInput:{value:rtBright.texture},uDir:{value:new THREE.Vector2(1,0)},uRes:{value:new THREE.Vector2(HW,HH)}},\n        vertexShader:SQ_V,fragmentShader:BLUR_F,depthTest:false,depthWrite:false\n      });\n      const blurVMat=new THREE.ShaderMaterial({\n        uniforms:{tInput:{value:rtBlurH.texture},uDir:{value:new THREE.Vector2(0,1)},uRes:{value:new THREE.Vector2(HW,HH)}},\n        vertexShader:SQ_V,fragmentShader:BLUR_F,depthTest:false,depthWrite:false\n      });\n      const compMat=new THREE.ShaderMaterial({\n        uniforms:{tScene:{value:rtLensed.texture},tBloom:{value:rtBlurV.texture},uStrength:{value:0.44}},\n        vertexShader:SQ_V,fragmentShader:COMP_F,depthTest:false,depthWrite:false\n      });\n\n      const scLens=mkSc(lensMat),scTh=mkSc(threshMat),scBH=mkSc(blurHMat),scBV=mkSc(blurVMat),scCo=mkSc(compMat);\n      this._lensMat=lensMat;\n\n      this._blRender=()=>{\n        rend.setRenderTarget(rtScene);  rend.render(sc,cam);\n        rend.setRenderTarget(rtLensed); rend.render(scLens,sqCam);\n        rend.setRenderTarget(rtBright); rend.render(scTh,  sqCam);\n        rend.setRenderTarget(rtBlurH);  rend.render(scBH,  sqCam);\n        rend.setRenderTarget(rtBlurV);  rend.render(scBV,  sqCam);\n        rend.setRenderTarget(null);     rend.render(scCo,  sqCam);\n      };\n      this._blSetSize=(w,h)=>{\n        const hw=Math.floor(w/2),hh=Math.floor(h/2);\n        rtScene.setSize(w,h);rtLensed.setSize(w,h);\n        rtBright.setSize(hw,hh);rtBlurH.setSize(hw,hh);rtBlurV.setSize(hw,hh);\n        blurHMat.uniforms.uRes.value.set(hw,hh);\n        blurVMat.uniforms.uRes.value.set(hw,hh);\n      };\n    }catch(e){console.warn('Bloom/lensing init failed:',e);this._blRender=null;this._lensMat=null;}\n  }\n\n  /* ──────── SCROLL ──────── */\n  _initScroll(){\n    const fn=()=>{\n      const el=document.body,tot=el.scrollHeight-el.clientHeight;\n      if(tot<=0) return;\n      const p=Math.min(1,Math.max(0,el.scrollTop/tot));\n      this._progTarget=p;\n      if(this.vProgressRef.current) this.vProgressRef.current.style.height=(p*100)+'%';\n      const si=Math.min(4,Math.floor(p*5));\n      if(si!==this._step){this._step=si;this._show(si,false);}\n    };\n    document.body.addEventListener('scroll',fn,{passive:true});\n    window.addEventListener('scroll',fn,{passive:true});\n    this._fns.push(()=>{document.body.removeEventListener('scroll',fn);window.removeEventListener('scroll',fn);});\n    [this.dot0Ref,this.dot1Ref,this.dot2Ref,this.dot3Ref,this.dot4Ref].forEach((ref,i)=>{\n      if(!ref.current) return;\n      ref.current.addEventListener('click',()=>{\n        const el=document.body,tot=el.scrollHeight-el.clientHeight;\n        el.scrollTo({top:(i/5)*tot,behavior:'smooth'});\n      });\n    });\n  }\n\n  /* ──────── STEP CONTENT ──────── */\n  _show(idx,first){\n    const s=this._steps[idx]; if(!s) return;\n    const ac=this._accents[idx];\n    if(this.kickerRef.current){this.kickerRef.current.textContent=s.code;this.kickerRef.current.style.color=ac;}\n    if(this.titleRef.current)  this.titleRef.current.textContent=s.title;\n    if(this.bodyRef.current)   this.bodyRef.current.textContent=s.body;\n    if(this.bgNumRef.current)  this.bgNumRef.current.textContent=String(idx+1).padStart(2,'0');\n    if(this.tagsRef.current){\n      this.tagsRef.current.innerHTML=s.tags.map(tg=>\n        `<span style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;color:${ac};padding:5px 12px;border:1px solid ${ac}44;border-radius:3px;background:rgba(4,10,28,.6);white-space:nowrap\">${tg}<\u002Fspan>`\n      ).join('');\n    }\n    [this.dot0Ref,this.dot1Ref,this.dot2Ref,this.dot3Ref,this.dot4Ref].forEach((d,i)=>{\n      if(!d.current) return;\n      d.current.style.width=i===idx?'60px':'24px';\n      d.current.style.background=i===idx?ac:'rgba(100,185,255,.18)';\n    });\n    const cp=this._camPos[idx];\n    this._camTarget.x=cp.x;this._camTarget.y=cp.y;this._camTarget.z=cp.z;\n    const ke=this.kickerRef.current,te=this.titleRef.current,be=this.bodyRef.current,tge=this.tagsRef.current;\n    if(window.gsap){\n      window.gsap.killTweensOf([ke,te,be,tge]);\n      window.gsap.fromTo(ke,{opacity:0},{opacity:1,duration:.22,delay:first?.30:.00,ease:'power2.out'});\n      window.gsap.fromTo(te,\n        {clipPath:'inset(0 100% 0 0)',opacity:1},\n        {clipPath:'inset(0 0% 0 0)',opacity:1,duration:first?.68:.48,delay:first?.42:.10,ease:'power3.inOut'}\n      );\n      window.gsap.fromTo([be,tge],\n        {y:14,opacity:0},\n        {y:0,opacity:1,duration:first?.55:.38,stagger:.07,delay:first?.58:.22,ease:'power2.out'}\n      );\n    }else{[ke,te,be,tge].forEach(el=>{if(el)el.style.opacity='1';});}\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
